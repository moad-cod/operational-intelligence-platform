version: 2

models:

  - name: dim_devices

    columns:

      - name: device_id
        tests:
          - not_null
          - unique

      - name: device_status
        tests:
          - not_null
          - accepted_values:
              values:
                - active
                - inactive
                - stale

      - name: device_health_status
        tests:
          - accepted_values:
              values:
                - healthy
                - monitor
                - warning
                - high_risk
                - critical

      - name: operational_priority
        tests:
          - accepted_values:
              values:
                - low
                - medium
                - high
                - urgent

      - name: is_active_flag
        tests:
          - accepted_values:
              values: [0, 1]