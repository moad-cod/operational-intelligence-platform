version: 2

models:

  - name: stg_glpi_computers
    description: "Staging layer for GLPI computers with standardized naming and type conversions"

    columns:

      - name: unique_id
        description: "Composite key (computer_id + source_year)"
        tests:
          - not_null
          - unique

      - name: computer_id
        tests:
          - not_null

      - name: computer_uuid
        tests:
          - not_null

      - name: computer_name
        tests:
          - not_null

      - name: is_template
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

      - name: is_deleted
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

      - name: is_ocs_import
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

      - name: computer_type
        tests:
          - not_null
          - accepted_values:

              values:
                  - template
                  - real_machine

  - name: stg_glpi_logs
    description: "Staging layer for GLPI logs"

    columns:

      - name: unique_id
        tests:
          - not_null
          - unique

      - name: log_id
        tests:
          - not_null

      - name: entity_id
        tests:
          - not_null

      - name: entity_type
        tests:
          - not_null

      - name: updated_at
        tests:
          - not_null

      - name: change_type
        tests:
          - not_null
          - accepted_values:

              values:
                  - created
                  - updated
                  - deleted
                  - no_change

      - name: source_year
        tests:
          - not_null
          - accepted_values:

              values:
                  - '2013'
                  - '2014'
                  - '2015'

    tests:
      - change_type_consistency

  - name: stg_glpi_tickets
    description: "Staging model for GLPI tickets with cleaned schema and composite primary key"

    columns:

      - name: ticket_pk
        tests:
          - not_null
          - unique

      - name: ticket_id
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: source_year
        tests:
          - not_null
          - accepted_values:

              values:
                  - '2013'
                  - '2014'
                  - '2015'

      - name: status
        tests:
          - not_null

      - name: is_deleted
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

  - name: stg_glpi_ticketfollowups
    description: "Cleaned staging model for GLPI ticket followups"

    columns:

      - name: ticket_followup_pk
        tests:
          - not_null
          - unique

      - name: ticket_id
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: user_id
        tests:
          - not_null

      - name: is_private
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

      - name: source_year
        tests:
          - not_null
          - accepted_values:

              values:
                  - '2013'
                  - '2014'
                  - '2015'

  - name: stg_ticket_features
    description: "Aggregated ticket features from followups"

    columns:

      - name: ticket_id
        tests:
          - not_null
          - unique

      - name: followup_count
        tests:
          - not_null

      - name: duration_days
        tests:
          - not_null

      - name: positive_signals
        tests:
          - not_null

      - name: negative_signals
        tests:
          - not_null

      - name: is_resolved_flag
        tests:
          - not_null
          - accepted_values:

              values: [0, 1]

  - name: stg_glpi_users
    description: "Cleaned GLPI users"

    columns:

      - name: user_pk
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

      - name: user_name
        tests:
          - not_null

      - name: source_year
        tests:
          - not_null
          - accepted_values:

              values:
                  - '2013'
                  - '2014'
                  - '2015'

      - name: user_type
        tests:
          - not_null
          - accepted_values:

              values:
                  - SYSTEM
                  - SERVICE
                  - HUMAN
                  - TEST
                  - UNKNOWN

  - name: stg_glpi_deviceprocessors

    columns:

      - name: processor_pk
        tests:
          - not_null
          - unique

      - name: architecture
        tests:
          - accepted_values:

              values:
                  - x86
                  - x64
                  - unknown

      - name: performance_tier
        tests:
          - accepted_values:

              values:
                  - low
                  - medium
                  - high
                  - unknown

  - name: stg_glpi_devicememories

    columns:

      - name: memory_pk
        tests:
          - not_null
          - unique

      - name: is_ecc
        tests:
          - accepted_values:

              values: [0, 1]

      - name: performance_tier
        tests:
          - accepted_values:

              values:
                  - low
                  - medium
                  - high
                  - unknown

  - name: stg_glpi_devicegraphiccards

    columns:

      - name: gpu_pk
        tests:
          - not_null
          - unique

      - name: gpu_type
        tests:
          - accepted_values:

              values:
                  - integrated
                  - dedicated

      - name: performance_tier
        tests:
          - accepted_values:

              values:
                  - low
                  - medium
                  - high
                  - unknown

  - name: stg_ocs_bios

    columns:

      - name: bios_pk
        tests:
          - not_null
          - unique

      - name: device_type
        tests:
          - accepted_values:

              values:
                  - desktop
                  - laptop
                  - other

      - name: manufacturer_group
        tests:
          - accepted_values:

              values:
                  - HP
                  - Dell
                  - Lenovo
                  - Foxconn
                  - MSI
                  - Other

  - name: stg_ocs_drives

    columns:

      - name: drive_pk
        tests:
          - not_null
          - unique

      - name: drive_type
        tests:
          - accepted_values:

              values:
                  - disk
                  - cdrom
                  - removable
                  - other

      - name: filesystem
        tests:
          - accepted_values:
              config:
                severity: warn

              values:
                  - NTFS
                  - FAT32
                  - FAT
                  - EXFAT

      - name: partition_type
        tests:
          - accepted_values:

              values:
                  - system
                  - data
                  - recovery
                  - other

      - name: disk_risk_level
        tests:
          - accepted_values:
              config:
                severity: warn

              values:
                  - critical
                  - high
                  - medium
                  - low

      - name: is_tiny_partition
        tests:
          - accepted_values:

              values: [0, 1]

  - name: stg_ocs_hardware

    columns:

      - name: hardware_pk
        tests:
          - not_null
          - unique

      - name: os_family
        tests:
          - accepted_values:

              values:
                  - Windows XP
                  - Windows 7
                  - Windows 8
                  - Windows 10
                  - Windows Other
                  - Other

      - name: memory_tier
        tests:
          - accepted_values:

              values:
                  - unknown
                  - invalid_or_legacy
                  - low
                  - medium
                  - high

      - name: architecture
        tests:
          - accepted_values:

              values:
                  - x86
                  - x64
                  - unknown

      - name: device_status
        tests:
          - accepted_values:

              values:
                  - active
                  - inactive
                  - stale