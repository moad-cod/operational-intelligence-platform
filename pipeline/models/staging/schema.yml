version: 2

models:

  # =====================================
  # GLPI COMPUTERS
  # =====================================

  - name: stg_glpi_computers

    description: "Cleaned staging model for GLPI computers"

    columns:

      - name: unique_id
        description: "Composite technical key"
        tests:
          - not_null
          - unique

      - name: computer_id
        tests:
          - not_null

      - name: computer_uuid

      - name: has_uuid
        tests:
          - not_null

      - name: computer_name
        tests:
          - not_null

      - name: is_template
        tests:
          - not_null

      - name: is_deleted
        tests:
          - not_null

      - name: is_ocs_import
        tests:
          - not_null

      - name: source_year
        tests:
          - not_null
          - accepted_values:
              values: [2013, 2014, 2015]

      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI

      - name: computer_type
        tests:
          - accepted_values:
              values:
                - template
                - real_machine

  - name: stg_glpi_devicegraphiccards

    description: "Cleaned staging model for GLPI graphic cards"

    columns:

      - name: gpu_pk
        tests:
          - not_null
          - unique

      - name: gpu_id
        tests:
          - not_null

      - name: gpu_name
        tests:
          - not_null

      - name: gpu_brand
        tests:
          - not_null
          - accepted_values:
              values:
                - NVIDIA
                - Intel
                - AMD
                - Matrox
                - Other

      - name: gpu_type
        tests:
          - not_null
          - accepted_values:
              values:
                - integrated
                - dedicated
                - virtual

      - name: performance_tier
        tests:
          - not_null
          - accepted_values:
              values:
                - low
                - medium
                - high
                - unknown
                - virtual

      - name: source_year
        tests:
          - not_null
          - accepted_values:
              values:
                - 2013
                - 2014
                - 2015

      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
  - name: stg_glpi_devicememories

    description: "Cleaned staging model for GLPI memory devices"

    columns:

      - name: memory_pk
        description: "Composite primary key using source year and memory id"
        tests:
          - not_null
          - unique

      - name: memory_id
        tests:
          - not_null

      - name: designation

      - name: memory_type
        tests:
          - not_null
          - accepted_values:
              values:
                - DDR5
                - DDR4
                - DDR3
                - DDR2
                - DDR
                - SDRAM
                - RDRAM
                - Other

      - name: is_ecc
        tests:
          - not_null

      - name: frequency_mhz

      - name: has_frequency_data
        tests:
          - not_null

      - name: memory_size_gb

      - name: memory_capacity_tier
        tests:
          - not_null
          - accepted_values:
              values:
                - enterprise
                - high
                - medium
                - low
                - legacy

      - name: performance_tier
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
                - low
                - unknown

      - name: is_server_memory
        tests:
          - not_null

      - name: source_year
        tests:
          - not_null
          - accepted_values:
              values:
                - 2013
                - 2014
                - 2015

      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
