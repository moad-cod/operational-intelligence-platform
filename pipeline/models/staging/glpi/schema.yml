version: 2

models:
  - name: stg_glpi_computers
    description: Staging layer for GLPI computers with standardized naming and type conversions

    columns:
      - name: unique_id
        description: Composite key (computer_id + source_year)
        tests:
          - not_null
          - unique

      - name: computer_id
        description: Identifier for computer (not unique across years)
        tests:
          - not_null

      - name: computer_uuid
        description: UUID of computer
        tests:
          - not_null

      - name: computer_name
        description: Name of computer
        tests:
          - not_null

      - name: is_template
        description: Flag indicating if computer is a template
        tests:
          - not_null
          - accepted_values:
              values: [1, 0]

      - name: is_deleted
        description: Flag indicating if computer is deleted
        tests:
          - not_null
          - accepted_values:
              values: [1, 0]

      - name: is_ocs_import
        description: Flag indicating if computer was imported from OCS
        tests:
          - not_null
          - accepted_values:
              values: [1, 0]

      - name: computer_type
        description: Type of computer (template or real_machine)
        tests:
          - not_null
          - accepted_values:
              values: ['template', 'real_machine']

  - name: stg_glpi_logs
    description: Staging layer for GLPI logs

    columns:
      # primary key
      - name: unique_id
        description: Unique identifier for log event
        tests:
          - not_null
          - unique

      - name: log_id
        description: Identifier for log event (not unique across years)
        tests:
          - not_null
          
      # entity
      - name: entity_id
        description: ID of related entity
        tests:
          - not_null

      - name: entity_type
        description: Type of entity (Computer, Ticket, etc.)
        tests:
          - not_null

      # timestamp
      - name: updated_at
        description: Timestamp of modification
        tests:
          - not_null

      # derived logic
      - name: change_type
        description: Type of change (created, updated, deleted, no_change)
        tests:
          - not_null
          - accepted_values:
              values: ['created', 'updated', 'deleted', 'no_change']

      # source tracking
      - name: source_year
        description: Source year of data
        tests:
          - not_null
          - accepted_values:
              values: ['2013', '2014', '2015']
    tests:
      - change_type_consistency

models:
  - name: stg_glpi_tickets
    description: "Staging model for GLPI tickets with cleaned schema and composite primary key"

    columns:

      - name: ticket_pk
        description: "Primary key: year + id"
        tests:
          - not_null
          - unique

      - name: ticket_id
        description: "Original ticket ID (not globally unique)"
        tests:
          - not_null

      - name: created_at
        description: "Ticket creation timestamp"
        tests:
          - not_null

      - name: source_year
        description: "Source year of the ticket"
        tests:
          - not_null
          - accepted_values:
              values: ['2013', '2014', '2015']

      - name: status
        tests:
          - not_null

      - name: is_deleted
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]