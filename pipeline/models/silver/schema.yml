version: 2

models:

  - name: silver_tickets
    description: "Unified, deduplicated ticket model combining GLPI ITSM and Kaggle customer support tickets with standardized priorities and statuses"
    columns:

      - name: event_pk
        description: "Unique silver event identifier"
        tests:
          - not_null
          - unique

      - name: source_system
        description: "Origin system (GLPI / customer_support_tickets_200k / dataset_tickets_multi_lang)"
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
                - customer_support_tickets_200k
                - dataset_tickets_multi_lang

      - name: source_id
        tests:
          - not_null

      - name: priority
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low
                - unknown

      - name: ticket_status
        tests:
          - not_null
          - accepted_values:
              values:
                - open
                - in_progress
                - resolved
                - closed
                - escalated
                - unknown

      - name: is_closed
        tests:
          - not_null

      - name: priority_score
        tests:
          - not_null

      - name: complexity_level
        tests:
          - not_null
          - accepted_values:
              values:
                - complex
                - moderate
                - simple
                - unknown

  - name: silver_assets
    description: "Unified asset inventory combining OCS hardware inventory with GLPI ITSM asset data, financial info, hardware components, and software risk assessment"
    columns:

      - name: asset_pk
        description: "Unique silver asset identifier"
        tests:
          - not_null
          - unique

      - name: hardware_id
        tests:
          - not_null

      - name: asset_name
        tests:
          - not_null

      - name: manufacturer_group
        tests:
          - not_null
          - accepted_values:
              values:
                - HP
                - Dell
                - Lenovo
                - Foxconn
                - MSI
                - Other

      - name: device_type
        tests:
          - not_null
          - accepted_values:
              values:
                - desktop
                - laptop
                - server
                - other

      - name: os_family
        tests:
          - not_null
          - accepted_values:
              values:
                - Windows
                - Linux
                - MacOS
                - Other

      - name: memory_tier
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
                - low
                - critical

      - name: inventory_quality_tier
        tests:
          - not_null
          - accepted_values:
              values:
                - excellent
                - good
                - medium
                - poor

      - name: asset_lifecycle_stage
        tests:
          - accepted_values:
              values:
                - template
                - real_machine
                - unknown

      - name: asset_risk_score
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low

      - name: asset_health_status
        tests:
          - not_null
          - accepted_values:
              values:
                - active
                - idle
                - inactive

  - name: silver_security_events
    description: "Unified security events combining CVE vulnerabilities, Windows event logs, and security-related GLPI tickets with normalized severity scoring"
    columns:

      - name: security_event_pk
        description: "Unique silver security event identifier"
        tests:
          - not_null
          - unique

      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values:
                - CVE
                - WINDOWS_EVENT
                - TICKET

      - name: severity_level
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low
                - informational
                - unknown
                - warning
                - audit

      - name: severity_score
        tests:
          - not_null

      - name: is_remote_exploitable
        tests:
          - not_null

      - name: is_critical
        tests:
          - not_null

      - name: easy_to_exploit
        tests:
          - not_null

  - name: silver_triage_features
    description: "ML-ready feature engineering from tickets — SLA risk, escalation probability, customer type, and triage prioritization"
    columns:

      - name: ticket_fk
        description: "Foreign key to silver_tickets"
        tests:
          - not_null
          - unique

      - name: ticket_age_hours

      - name: escalation_probability

      - name: sla_risk_score

      - name: triage_priority
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low

      - name: escalation_risk_level
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
                - low

      - name: customer_type
        tests:
          - not_null
          - accepted_values:
              values:
                - new
                - returning
                - repeat
                - frequent

  - name: silver_user_activity
    description: "Unified user activity audit combining ticket followups, GLPI logs, and OCS inventory activity with suspicious activity detection"
    columns:

      - name: activity_pk
        description: "Unique silver activity identifier"
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

      - name: username
        tests:
          - not_null

      - name: user_type
        tests:
          - not_null
          - accepted_values:
              values:
                - SYSTEM
                - SERVICE
                - TEST
                - HUMAN
                - UNKNOWN

      - name: activity_type
        tests:
          - not_null

      - name: activity_category
        tests:
          - not_null
          - accepted_values:
              values:
                - read
                - write

      - name: is_suspicious_activity
        tests:
          - not_null