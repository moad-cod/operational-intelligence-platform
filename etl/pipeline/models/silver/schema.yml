version: 2

models:

  - name: silver_tickets
    description: "Unified, deduplicated ticket model combining GLPI ITSM and Kaggle customer support tickets with standardized priorities and statuses"
    columns:

      - name: event_pk
        description: "Unique silver event identifier"
        tests:
          - not_null
          - unique

      - name: source_system
        description: "Origin system (GLPI / customer_support_tickets_200k / dataset_tickets_multi_lang)"
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
                - customer_support_tickets_200k
                - dataset_tickets_multi_lang

      - name: source_id
        tests:
          - not_null

      - name: priority
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low
                - unknown

      - name: ticket_status
        tests:
          - not_null
          - accepted_values:
              values:
                - open
                - in_progress
                - resolved
                - closed
                - escalated
                - unknown

      - name: is_closed
        tests:
          - not_null

      - name: priority_score
        tests:
          - not_null

      - name: complexity_level
        tests:
          - not_null
          - accepted_values:
              values:
                - complex
                - moderate
                - simple
                - unknown

  - name: silver_assets
    description: >
      Unified asset inventory combining OCS hardware inventory with GLPI ITSM
      asset data, financial info, hardware components, software risk, and
      Kaggle SMART hard-drive metrics for failure prediction.
      Two branches: GLPI/OCS assets (failure_label=NULL, to predict) and
      Kaggle hard drives (failure_label=0/1 ground truth for training).
    columns:

      - name: asset_pk
        description: "Unique silver asset identifier"
        tests:
          - not_null
          - unique

      - name: asset_name
        description: "Normalized hostname or serial number"
        tests:
          - not_null

      - name: source_domain
        description: "Data source domain: ocs_glpi or kaggle_harddrive"
        tests:
          - not_null
          - accepted_values:
              values:
                - ocs_glpi
                - kaggle_harddrive

      - name: system_manufacturer

      - name: system_model

      - name: serial_number

      - name: device_type
        tests:
          - accepted_values:
              values:
                - desktop
                - laptop
                - server
                - storage
                - other

      - name: uuid

      - name: source_year

      - name: asset_age_years
        description: "Age in years: from GLPI buy_date if available, else BIOS firmware date, else 0"
        tests:
          - not_null

      - name: bios_risk_encoded
        description: "Ordinal: 0=low, 1=medium, 2=high, 3=critical, NULL=unknown. Based on BIOS firmware date."

      - name: drive_health_encoded
        description: "Ordinal: 0=good, 1=medium, 2=high, 3=critical, 0=NULL. MAX across all drives (worst-case)."
        tests:
          - not_null

      - name: storage_capacity_gb
        tests:
          - not_null

      - name: drive_count
        tests:
          - not_null

      - name: memory_gb

      - name: cpu_cores

      - name: high_risk_software_count
        tests:
          - not_null

      - name: risk_software_ratio
        tests:
          - not_null

      - name: software_installed_count
        tests:
          - not_null

      - name: incident_count
        description: "Total tickets for GLPI; Start/Stop + Power Cycle count for Kaggle"
        tests:
          - not_null

      - name: hardware_incident_count
        description: "GLPI-only: count of type=1 (incident) tickets linked to this Computer. NULL for Kaggle."

      - name: days_since_last_inventory
        tests:
          - not_null

      - name: has_warranty
        tests:
          - not_null

      - name: glpi_failure_proxy
        description: >
          GLPI-only: 1 if asset has evidence of hardware failure (≥2 hardware incidents
          or ≥1 critical hardware incident). 0 if no evidence. NULL for Kaggle.
          Designed as a defensible proxy — not ground truth.

      - name: power_on_hours
        description: "SMART 9 Raw — Kaggle only; NULL for GLPI/OCS"

      - name: reallocated_sectors
        description: "SMART 5 Raw — Kaggle only; NULL for GLPI/OCS"

      - name: pending_sectors
        description: "SMART 197 Raw — Kaggle only; NULL for GLPI/OCS"

      - name: uncorrectable_errors
        description: "SMART 187 + 198 Raw — Kaggle only; NULL for GLPI/OCS"

      - name: command_timeouts
        description: "SMART 188 Raw — Kaggle only; NULL for GLPI/OCS"

      - name: failure_label
        description: "Target: 1=failed, 0=healthy (Kaggle ground truth); NULL for GLPI/OCS (to predict)"

  - name: silver_security_events
    description: "Unified security events from CVE, Windows logs and GLPI tickets"
    columns:

      - name: security_event_pk
        tests:
          - not_null
          - unique

      - name: event_type
        tests:
          - not_null

      - name: severity_level
        tests:
          - not_null

      - name: severity_score
        tests:
          - not_null

  - name: silver_triage_features
    description: "ML-ready feature engineering from tickets — SLA risk, escalation probability, customer type, and triage prioritization"
    columns:

      - name: ticket_fk
        description: "Foreign key to silver_tickets"
        tests:
          - not_null
          - unique

      - name: ticket_age_hours

      - name: escalation_probability

      - name: sla_risk_score

      - name: triage_priority
        tests:
          - not_null
          - accepted_values:
              values:
                - critical
                - high
                - medium
                - low

      - name: escalation_risk_level
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
                - low

      - name: customer_type
        tests:
          - not_null
          - accepted_values:
              values:
                - new
                - returning
                - repeat
                - frequent

  - name: silver_user_activity
    description: "Unified user activity audit combining ticket followups, GLPI logs, and OCS inventory activity with suspicious activity detection"
    columns:

      - name: activity_pk
        description: "Unique silver activity identifier"
        tests:
          - not_null
          - unique

      - name: user_id
        tests:
          - not_null

      - name: username
        tests:
          - not_null

      - name: user_type
        tests:
          - not_null
          - accepted_values:
              values:
                - SYSTEM
                - SERVICE
                - TEST
                - HUMAN
                - UNKNOWN

      - name: activity_type
        tests:
          - not_null

      - name: activity_category
        tests:
          - not_null
          - accepted_values:
              values:
                - read
                - write

      - name: is_suspicious_activity
        tests:
          - not_null
