version: 2

models:

  - name: gold_sla_prediction_features
    description: >
      ML classification dataset for SLA breach prediction.
      Each row = one ticket from GLPI or Kaggle with derived SLA features.
      Target variable: was_sla_breached (0/1).
      Imputation note: GLPI rows have NULL complexity_score, tenure_months,
      previous_tickets, is_escalated — impute with dataset medians or zero-fill
      before training.
    columns:

      - name: sla_feature_pk
        description: "Unique primary key for SLA prediction features"
        tests:
          - not_null
          - unique

      - name: source_ticket_pk
        description: "Original ticket PK from source staging model"
        tests:
          - not_null

      - name: source_system
        description: "Source system: GLPI or Kaggle dataset name"
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
                - customer_support_tickets_200k
                - dataset_tickets_multi_lang

      - name: ticket_id
        tests:
          - not_null

      - name: priority_score
        description: "Ordinal priority: 5=critical, 4=high, 3=medium, 2=low, 1=unknown"
        tests:
          - not_null

      - name: urgency_score
        description: "Ordinal urgency (GLPI only; NULL for Kaggle)"

      - name: impact_score
        description: "Ordinal impact (GLPI only; NULL for Kaggle)"

      - name: ticket_age_hours
        description: "Hours since creation (or until closure)"
        tests:
          - not_null

      - name: was_sla_breached
        description: "Target variable: 1 if SLA was breached, 0 otherwise"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: followup_count
        description: "Number of followups on the ticket"
        tests:
          - not_null

      - name: private_followup_ratio
        description: "Ratio of private followups to total followups"

      - name: avg_followup_content_length
        description: "Average character length of followup content"

      - name: issue_complexity_score
        description: "Kaggle-only: complexity rating; NULL for GLPI"

      - name: customer_tenure_months
        description: "Kaggle-only: months customer has been active; NULL for GLPI"

      - name: previous_tickets
        description: "Kaggle-only: number of previous tickets by this customer; NULL for GLPI"

      - name: is_escalated
        description: "Kaggle-only: whether ticket was escalated; 0 for GLPI"
        tests:
          - accepted_values:
              values: [0, 1]

  - name: gold_ticket_similarity
    description: >
      HYBRID SIMILARITY ARCHITECTURE — two independent pipelines:
      1. KAGGLE: real NLP text (ticket_subject + ticket_body) → sentence-transformers → FAISS
      2. GLPI: synthetic context (reconstructed metadata tokens) → TF-IDF / structured embeddings → FAISS
      HARD LIMITATION: GLPI tickets have NULL ticket_subject, ticket_body, and category.
      No real NLP text exists for GLPI. All GLPI representations are synthetic reconstructions
      from structured metadata only. Do NOT treat GLPI similarity scores as equivalent to Kaggle NLP scores.
    columns:

      - name: similarity_pk
        description: "Unique primary key for similarity features"
        tests:
          - not_null
          - unique

      - name: ticket_pk
        description: "Original ticket PK from source staging"
        tests:
          - not_null

      - name: source_system
        description: "Source system identifier"
        tests:
          - not_null
          - accepted_values:
              values:
                - GLPI
                - customer_support_tickets_200k
                - dataset_tickets_multi_lang

      - name: text_corpus
        description: "Real NLP text: ticket_subject + ticket_body concatenation (Kaggle only; NULL for GLPI)"

      - name: synthetic_text_corpus
        description: >
          GLPI-only: reconstructed contextual metadata representation from structured fields.
          NOT real natural language. A space-separated token string encoding priority, urgency,
          impact, status, SLA breach status, lifecycle timing, followup behavioral patterns,
          and infrastructure context (OS, hardware, BIOS, software).
          Suitable for TF-IDF, SentenceTransformer, or FeatureHasher embedding.

      - name: similarity_method
        description: "'synthetic_context' for GLPI, 'nlp_embedding' for Kaggle"
        tests:
          - not_null
          - accepted_values:
              values:
                - synthetic_context
                - nlp_embedding

      - name: embedding_strategy
        description: "'structured_metadata' for GLPI, 'nlp_semantic' for Kaggle"
        tests:
          - not_null
          - accepted_values:
              values:
                - structured_metadata
                - nlp_semantic

      - name: text_source_type
        description: "'synthetic_context' for GLPI, 'real_text' for Kaggle"
        tests:
          - not_null
          - accepted_values:
              values:
                - synthetic_context
                - real_text

      - name: embedding_model
        description: "NLP model used for embedding (Kaggle: paraphrase-multilingual-MiniLM-L12-v2; GLPI: NULL)"

      - name: priority_encoded
        description: "Ordinal priority: 5=critical, 4=high, 3=medium, 2=low, 1=unknown (GLPI only; NULL for Kaggle)"

      - name: urgency_encoded
        description: "Ordinal urgency: 5=critical, 4=high, 3=medium, 2=low, 1=unknown (GLPI only; NULL for Kaggle)"

      - name: impact_encoded
        description: "Ordinal impact: 5=critical, 4=high, 3=medium, 2=low, 1=unknown (GLPI only; NULL for Kaggle)"

      - name: followup_count_bucket
        description: "Bucketed followup count: 1-5 scale (GLPI only; NULL for Kaggle)"

      - name: corpus_quality_score
        description: >
          Trustworthiness of the ticket representation (0.0–1.0).
          1.0 = real NLP text (Kaggle).
          0.70 = rich synthetic context with infrastructure joins (GLPI).
          0.50 = metadata + followup tokens only (GLPI).
          0.30 = ticket metadata only (GLPI sparse).
          Use for downstream ranking, recommendation filtering, and UI transparency.
        tests:
          - not_null

      - name: similarity_confidence
        description: >
          Retrieval reliability score (0.0–1.0). Accounts for representational quality.
          0.90 = real NLP embeddings (Kaggle).
          0.65 = synthetic context with infrastructure joins (GLPI).
          0.45 = synthetic context without infrastructure joins (GLPI).
          0.25 = sparse metadata only (GLPI).
          Must be exposed to downstream systems so recommendation confidence is transparent.

      - name: followup_count
        description: "Total number of followups on this ticket (GLPI only; 0 for Kaggle)"

      - name: avg_followup_content_length
        description: "Average character length of followup content (GLPI only; 0 for Kaggle)"

      - name: private_followup_ratio
        description: "Ratio of private followups to total (GLPI only; 0 for Kaggle)"

      - name: url_content_ratio
        description: "Ratio of followups containing URLs (GLPI only; 0 for Kaggle)"

      - name: meaningful_content_ratio
        description: "Ratio of followups with meaningful content (GLPI only; 0 for Kaggle)"

      - name: has_os_context
        description: "1 if OS family info was joined from OCS, 0 otherwise (GLPI only; 0 for Kaggle)"

      - name: has_hardware_context
        description: "1 if hardware specs (memory) were joined from OCS, 0 otherwise (GLPI only; 0 for Kaggle)"

      - name: has_bios_context
        description: "1 if BIOS risk info was joined from OCS, 0 otherwise (GLPI only; 0 for Kaggle)"

      - name: has_software_context
        description: "1 if software risk info was joined from OCS, 0 otherwise (GLPI only; 0 for Kaggle)"

  - name: gold_asset_failure_risk
    description: >
      One-row-per-asset feature dataset for unsupervised anomaly detection.
      Combines OCS hardware inventory, BIOS age, drive/storage health,
      software risk profile, GLPI financial data, and ticket incident history.
      rule_based_risk_score is the heuristic baseline for comparison with
      Isolation Forest anomaly_score.
    columns:

      - name: hardware_pk
        description: "Primary key from OCS hardware staging"
        tests:
          - not_null
          - unique

      - name: asset_name
        description: "Normalized hostname or fallback identifier"
        tests:
          - not_null

      - name: device_age_years
        description: "BIOS age in years"
        tests:
          - not_null

      - name: bios_risk_level_encoded
        description: "Ordinal: 0=unknown, 1=low, 2=medium, 3=high, 4=critical"
        tests:
          - not_null

      - name: worst_drive_health_encoded
        description: "Ordinal: 0=unknown, 1=healthy, 2=medium, 3=high, 4=critical"
        tests:
          - not_null

      - name: high_risk_software_count
        description: "Count of software with risk level critical or high"
        tests:
          - not_null

      - name: risk_software_ratio
        description: "high_risk_software_count / total_software_count"
        tests:
          - not_null

      - name: incident_count
        description: "Count of GLPI tickets referencing this asset"
        tests:
          - not_null

      - name: days_since_last_inventory
        description: "Days since OCS last inventoried this asset"
        tests:
          - not_null

      - name: rule_based_risk_score
        description: "Heuristic risk score baseline (4-16 range); comparison column for ML output"
        tests:
          - not_null

      - name: anomaly_score
        description: "Isolation Forest anomaly score (lower = more anomalous); populated by Python"

      - name: is_anomaly
        description: "Boolean anomaly flag from Isolation Forest; populated by Python"
        tests:
          - accepted_values:
              values: [0, 1]

  - name: gold_user_activity_anomalies
    description: >
      One-row-per-user behavioral feature dataset for unsupervised anomaly detection.
      Aggregates activity from tickets, logs, and OCS inventory.
      is_suspicious_user is a WEAK HEURISTIC — do NOT use as training label.
      Use only for post-hoc validation of model output.
    columns:

      - name: user_pk
        description: "Primary key from GLPI users staging"
        tests:
          - not_null
          - unique

      - name: user_name
        description: "Login username"
        tests:
          - not_null

      - name: user_type
        description: "User type classification"
        tests:
          - not_null
          - accepted_values:
              values:
                - HUMAN
                - SERVICE
                - SYSTEM
                - TEST
                - UNKNOWN

      - name: user_type_encoded
        description: "Ordinal: 0=HUMAN, 1=SERVICE, 2=SYSTEM, 3=TEST, 4=UNKNOWN"
        tests:
          - not_null

      - name: is_ldap_user
        description: "Whether user has an LDAP directory account"
        tests:
          - accepted_values:
              values: [0, 1]

      - name: is_suspicious_user
        description: "WEAK HEURISTIC — do NOT use as label. Post-hoc validation only."
        tests:
          - accepted_values:
              values: [0, 1]

      - name: total_activity_count
        description: "Total count of all tracked activities across sources"
        tests:
          - not_null

      - name: private_followup_ratio
        description: "Ratio of private followups to total followups"

      - name: url_content_ratio
        description: "Ratio of followups containing URLs with no meaningful content"

      - name: unique_entities_touched
        description: "Number of distinct GLPI entities this user modified"
        tests:
          - not_null

      - name: write_action_ratio
        description: "Ratio of write actions (create/update/delete) to total log actions"

      - name: activity_density
        description: "Total activity count per day of active span"

      - name: isolation_forest_score
        description: "Isolation Forest anomaly score; populated by Python"

      - name: lof_score
        description: "Local Outlier Factor score; populated by Python"

      - name: is_anomaly_if
        description: "Isolation Forest anomaly flag; populated by Python"

      - name: is_anomaly_lof
        description: "LOF anomaly flag; populated by Python"
